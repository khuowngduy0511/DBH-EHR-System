      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__VirtualHost=/
      - RabbitMQ__Username=admin
      - RabbitMQ__Password=dbh_123
      - Redis__ConnectionString=redis:6379,password=dbh_123
      - Redis__Enabled=true
      - 'Redis__InstanceName=DBH-Consent:'
      - ServiceUrls__AuthService=http://auth_service:5101
      - ServiceUrls__EhrService=http://ehr_service:5003
      - ServiceUrls__AuditService=http://audit_service:5005
      - ServiceUrls__NotificationService=http://notification_service:5006
      - HyperledgerFabric__Enabled=true
      - HyperledgerFabric__SimulationMode=false
      - HyperledgerFabric__PeerEndpoint=peer0.hospital1.ehr.com:7051
      - HyperledgerFabric__GatewayPeerOverride=peer0.hospital1.ehr.com
      - HyperledgerFabric__MspId=Hospital1MSP
      - HyperledgerFabric__CertificatePath=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/users/Admin@hospital1.ehr.com/msp/signcerts/cert.pem
      - HyperledgerFabric__PrivateKeyDirectory=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/users/Admin@hospital1.ehr.com/msp/keystore
      - HyperledgerFabric__TlsCertificatePath=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/peers/peer0.hospital1.ehr.com/tls/ca.crt
    depends_on:
      pg_primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dbh_network
      - fabric_ehr
    volumes:
      - ./src/DBH.Blockchain.Network/organizations:/tmp/fabric-crypto:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Consent.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Consent.Service/Dockerfile

  audit_service:
    build:
      context: .
      dockerfile: src/DBH.Audit.Service/Dockerfile
    container_name: dbh_audit_service
    ports:
      - "5005:5005"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5005
      - TZ=Asia/Ho_Chi_Minh
      - ConnectionStrings__AuditDb=Host=pg_primary;Port=5432;Database=dbh_audit;Username=admin;Password=dbh_123
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__VirtualHost=/
      - RabbitMQ__Username=admin
      - RabbitMQ__Password=dbh_123
      - Redis__ConnectionString=redis:6379,password=dbh_123
      - Redis__Enabled=true
      - 'Redis__InstanceName=DBH-Audit:'
      - HyperledgerFabric__Enabled=true
      - HyperledgerFabric__SimulationMode=false
      - HyperledgerFabric__PeerEndpoint=peer0.hospital1.ehr.com:7051
      - HyperledgerFabric__GatewayPeerOverride=peer0.hospital1.ehr.com
      - HyperledgerFabric__MspId=Hospital1MSP
      - HyperledgerFabric__CertificatePath=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/users/Admin@hospital1.ehr.com/msp/signcerts/cert.pem
      - HyperledgerFabric__PrivateKeyDirectory=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/users/Admin@hospital1.ehr.com/msp/keystore
      - HyperledgerFabric__TlsCertificatePath=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/peers/peer0.hospital1.ehr.com/tls/ca.crt
    depends_on:
      pg_primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dbh_network
      - fabric_ehr
    volumes:
      - ./src/DBH.Blockchain.Network/organizations:/tmp/fabric-crypto:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Audit.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Audit.Service/Dockerfile

  notification_service:
    build:
      context: .
      dockerfile: src/DBH.Notification.Service/Dockerfile
    container_name: dbh_notification_service
    ports:
      - "5006:5006"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5006
      - TZ=Asia/Ho_Chi_Minh
      - ConnectionStrings__NotificationDb=Host=pg_primary;Port=5432;Database=dbh_notification;Username=admin;Password=dbh_123
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__VirtualHost=/
      - RabbitMQ__Username=admin
      - RabbitMQ__Password=dbh_123
      - Redis__ConnectionString=redis:6379,password=dbh_123
      - Redis__Enabled=true
      - 'Redis__InstanceName=DBH-Notification:'
      - JwtSettings__Key=your-super-secret-key-for-jwt-token-generation-min-32-chars
      - JwtSettings__Issuer=DBH.Auth.Service
      - JwtSettings__Audience=DBH.EHR.System
    depends_on:
      pg_primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Notification.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Notification.Service/Dockerfile

  appointment_service:
    build:
      context: .
      dockerfile: src/DBH.Appointment.Service/Dockerfile
    container_name: dbh_appointment_service
    ports:
      - "5007:5007"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5007
      - TZ=Asia/Ho_Chi_Minh
      - ConnectionStrings__AppointmentDb=Host=pg_primary;Port=5432;Database=dbh_appointment;Username=admin;Password=dbh_123
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=admin
      - RabbitMQ__Password=dbh_123
      - Redis__ConnectionString=redis:6379,password=dbh_123
      - Redis__Enabled=true
      - 'Redis__InstanceName=DBH-Appointment:'
      - ServiceUrls__EhrService=http://ehr_service:5003
      - ServiceUrls__OrganizationService=http://organization_service:5002
      - ServiceUrls__AuthService=http://auth_service:5101
      - ServiceUrls__ConsentService=http://consent_service:5004
      - ServiceUrls__NotificationService=http://notification_service:5006
    depends_on:
      pg_primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Appointment.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Appointment.Service/Dockerfile

  payment_service:
    build:
      context: .
      dockerfile: src/DBH.Payment.Service/Dockerfile
    container_name: dbh_payment_service
    ports:
      - "5008:5008"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5008
      - TZ=Asia/Ho_Chi_Minh
      - ConnectionStrings__PaymentDb=Host=pg_primary;Port=5432;Database=dbh_payment;Username=admin;Password=dbh_123
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=admin
      - RabbitMQ__Password=dbh_123
      - Redis__ConnectionString=redis:6379,password=dbh_123
      - Redis__Enabled=true
      - 'Redis__InstanceName=DBH-Payment:'
      - ServiceUrls__OrganizationService=http://organization_service:5002
      - InternalApi__SecretKey=${INTERNAL_API_SECRET_KEY:-dbh-internal-s2s-secret-key-2026!}
    depends_on:
      pg_primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Payment.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Payment.Service/Dockerfile

  blockchain_service:
    build:
      context: .
      dockerfile: src/DBH.Blockchain.Service/Dockerfile
    container_name: dbh_blockchain_service
    ports:
      - "5090:5090"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5090
      - TZ=Asia/Ho_Chi_Minh
      - ConnectionStrings__BlockchainDb=Host=pg_primary;Port=5432;Database=dbh_blockchain;Username=admin;Password=dbh_123
      - ServiceUrls__AuthService=http://gateway:5000
      - ServiceUrls__EhrService=http://gateway:5000
      - IpfsConfig__ApiUrl=http://ipfs:5001/api/v0
      - IpfsConfig__GatewayUrl=http://ipfs:8080/ipfs
      - IpfsConfig__DownloadPath=/tmp/ipfs_downloads
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=admin
      - RabbitMQ__Password=dbh_123
      - HyperledgerFabric__Enabled=true
      - HyperledgerFabric__SimulationMode=false
      - HyperledgerFabric__PeerEndpoint=peer0.hospital1.ehr.com:7051
      - HyperledgerFabric__GatewayPeerOverride=peer0.hospital1.ehr.com
      - HyperledgerFabric__MspId=Hospital1MSP
      - HyperledgerFabric__CertificatePath=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/users/Admin@hospital1.ehr.com/msp/signcerts/cert.pem
      - HyperledgerFabric__PrivateKeyDirectory=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/users/Admin@hospital1.ehr.com/msp/keystore
      - HyperledgerFabric__TlsCertificatePath=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/peers/peer0.hospital1.ehr.com/tls/ca.crt
    depends_on:
      pg_primary:
        condition: service_healthy
      auth_service:
        condition: service_healthy
      ehr_service:
        condition: service_healthy
      ipfs:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - dbh_network
      - fabric_ehr
    volumes:
      - ./src/DBH.Blockchain.Network/organizations:/tmp/fabric-crypto:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Blockchain.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Blockchain.Service/Dockerfile

  # ============================================================================
  # AI & RAG SERVICES
  # ============================================================================

  lightrag:
    build:
      context: .
      dockerfile: lightrag.Dockerfile
    container_name: dbh_lightrag
    ports:
      - "9621:9621"
    environment:
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SUPABASE_PASSWORD=${SUPABASE_PASSWORD}
      - WORKSPACE_NAME=${WORKSPACE_NAME}
      - LLM_BINDING=openai
      - OPENAI_BASE_URL=https://openrouter.ai/api/v1
      - LLM_MODEL=openai/gpt-4o-mini
      - EMBEDDING_BINDING=openai
      - EMBEDDING_MODEL=openai/text-embedding-3-small
    volumes:
      - ../light-rag-DBH-system/knowledge_base:/app/knowledge_base
    networks:
      - dbh_network
    command: >
      sh -c "mkdir -p /app/knowledge_base/rag_storage &&
             python /app/knowledge_base/index_docs.py &&
             python /app/knowledge_base/rag_server.py"
    working_dir: /app/knowledge_base
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9621/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # DATABASES
  # ============================================================================

  pg_primary:
    image: postgres:15-alpine
    container_name: dbh_pg_primary
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=dbh_123
      - POSTGRES_MULTIPLE_DATABASES=dbh_identity,dbh_ehr,dbh_audit,dbh_organization,dbh_consent,dbh_notification,dbh_appointment,dbh_payment,dbh_blockchain,dbh_n8n
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin && psql -U admin -lqt | cut -d \\| -f 1 | grep -qw dbh_n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # IPFS
  # ============================================================================

  ipfs:
    image: ipfs/kubo:release
    container_name: dbh_ipfs
    restart: unless-stopped
    ports:
      - "4001:4001"
      - "4001:4001/udp"
      - "5001:5001"
      - "8080:8080"
    environment:
      - IPFS_PROFILE=server
      - IPFS_PATH=/data/ipfs
    volumes:
      - ipfs_data:/data/ipfs
      - ipfs_staging:/export
    networks:
      - dbh_network

  # ============================================================================
  # MESSAGE QUEUE
  # ============================================================================

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: dbh_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=dbh_123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================================
  # CACHE
  # ============================================================================

  redis:
    image: redis:7-alpine
    container_name: dbh_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass dbh_123
    environment:
      - REDIS_PASSWORD=dbh_123
    volumes:
      - redis_data:/data
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dbh_123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # WORKFLOW AUTOMATION (n8n)
  # ============================================================================

  n8n:
    image: n8nio/n8n:latest
    container_name: dbh_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Database - dùng PostgreSQL đã có sẵn
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=pg_primary
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=dbh_n8n
      - DB_POSTGRESDB_USER=admin
      - DB_POSTGRESDB_PASSWORD=dbh_123
      # n8n config
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=development
      - WEBHOOK_URL=http://localhost:5678/
      # CORS configuration cho Frontend
      - N8N_CORS_ALLOWED_ORIGINS=*
      - N8N_CORS_ALLOWED_METHODS=GET,POST,OPTIONS
      - N8N_CORS_ALLOWED_HEADERS=Content-Type,Authorization
      # Basic auth (tắt để dev dễ hơn)
      - N8N_BASIC_AUTH_ACTIVE=false
      # Disable secure cookie (cho phép truy cập qua HTTP)
      - N8N_SECURE_COOKIE=false
      # Timezone
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
      - TZ=Asia/Ho_Chi_Minh
      # Encryption key (generate one for prod)
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-dbh-n8n-dev-encryption-key-2026!}
      # Cho phép external calls đến các service trong network
      - N8N_EXTERNAL_FRONTEND_HOOKS_URLS=
      - EXECUTIONS_PROCESS=main
      # API Keys cho workflow
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - LIGHTRAG_CLOUD_URL=${LIGHTRAG_CLOUD_URL:-http://lightrag:9621}
      # Cho phép workflow truy cập env vars qua $env
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    depends_on:
      pg_primary:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================================================
# VOLUMES & NETWORKS
# ============================================================================

volumes:
  pg_primary_data:
  ipfs_data:
  ipfs_staging:
  rabbitmq_data:
  redis_data:
  n8n_data:

networks:
  dbh_network:
    driver: bridge
  fabric_ehr:
    external: true
    name: fabric_ehr
