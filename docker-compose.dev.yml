# DBH-EHR System - Docker Compose for Development
# Decentralized Blockchain Healthcare System for Secure EHR Management

services:
  # ============================================================================
  # API GATEWAY
  # ============================================================================
  gateway:
    build:
      context: .
      dockerfile: src/DBH.Gateway/Dockerfile
    container_name: dbh_gateway
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      - auth_service
      - organization_service
      - ehr_service
      - consent_service
      - audit_service
      - notification_service
      - appointment_service
      - payment_service
      - blockchain_service
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Gateway
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Gateway/Dockerfile

  # ============================================================================
  # MICROSERVICES
  # ============================================================================

  auth_service:
    build:
      context: .
      dockerfile: src/DBH.Auth.Service/Dockerfile
    container_name: dbh_auth_service
    ports:
      - "5101:5101"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5101
      - TZ=Asia/Ho_Chi_Minh
      - ConnectionStrings__PostgreSQL=Host=pg_primary;Port=5432;Database=dbh_identity;Username=admin;Password=dbh_123
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__VirtualHost=/
      - RabbitMQ__Username=admin
      - RabbitMQ__Password=dbh_123
      - Redis__ConnectionString=redis:6379,password=dbh_123
      - Redis__Enabled=true
      - 'Redis__InstanceName=DBH-Auth:'
      - ServiceUrls__OrganizationService=http://organization_service:5002
      - FabricCA__CaUrl=https://ca_hospital1:7054
      - FabricCA__CaName=ca-hospital1
      - FabricCA__AdminCertPath=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/users/Admin@hospital1.ehr.com/msp/signcerts/cert.pem
      - FabricCA__AdminKeyDirectory=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/users/Admin@hospital1.ehr.com/msp/keystore
      - FabricCA__TlsCertPath=/tmp/fabric-crypto/fabric-ca/hospital1/ca-cert.pem
    depends_on:
      pg_primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dbh_network
      - fabric_ehr
    volumes:
      - ./src/DBH.Blockchain.Network/organizations:/tmp/fabric-crypto:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5101/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Auth.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Auth.Service/Dockerfile

  organization_service:
    build:
      context: .
      dockerfile: src/DBH.Organization.Service/Dockerfile
    container_name: dbh_organization_service
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5002
      - TZ=Asia/Ho_Chi_Minh
      - ConnectionStrings__OrganizationDb=Host=pg_primary;Port=5432;Database=dbh_organization;Username=admin;Password=dbh_123
      - InternalApi__SecretKey=${INTERNAL_API_SECRET_KEY:-dbh-internal-s2s-secret-key-2026!}
      - Redis__ConnectionString=redis:6379,password=dbh_123
      - Redis__Enabled=true
      - 'Redis__InstanceName=DBH-Organization:'
    depends_on:
      pg_primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Organization.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Organization.Service/Dockerfile

  ehr_service:
    build:
      context: .
      dockerfile: src/DBH.EHR.Service/Dockerfile
    container_name: dbh_ehr_service
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5003
      - TZ=Asia/Ho_Chi_Minh
      - ConnectionStrings__EhrDb=Host=pg_primary;Port=5432;Database=dbh_ehr;Username=admin;Password=dbh_123
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__VirtualHost=/
      - RabbitMQ__Username=admin
      - RabbitMQ__Password=dbh_123
      - Redis__ConnectionString=redis:6379,password=dbh_123
      - Redis__Enabled=true
      - 'Redis__InstanceName=DBH-EHR:'
      - IpfsConfig__ApiUrl=http://ipfs:5001/api/v0
      - IpfsConfig__GatewayUrl=http://ipfs:8080/ipfs
      - IpfsConfig__DownloadPath=/tmp/ipfs_downloads
      - ServiceUrls__AuthService=http://auth_service:5101
      - ServiceUrls__ConsentService=http://consent_service:5004
      - ServiceUrls__AuditService=http://audit_service:5005
      - ServiceUrls__OrganizationService=http://organization_service:5002
      - ServiceUrls__NotificationService=http://notification_service:5006
      - HyperledgerFabric__Enabled=true
      - HyperledgerFabric__SimulationMode=false
      - HyperledgerFabric__PeerEndpoint=peer0.hospital1.ehr.com:7051
      - HyperledgerFabric__GatewayPeerOverride=peer0.hospital1.ehr.com
      - HyperledgerFabric__MspId=Hospital1MSP
      - HyperledgerFabric__CertificatePath=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/users/Admin@hospital1.ehr.com/msp/signcerts/cert.pem
      - HyperledgerFabric__PrivateKeyDirectory=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/users/Admin@hospital1.ehr.com/msp/keystore
      - HyperledgerFabric__TlsCertificatePath=/tmp/fabric-crypto/peerOrganizations/hospital1.ehr.com/peers/peer0.hospital1.ehr.com/tls/ca.crt
    depends_on:
      pg_primary:
        condition: service_healthy
      ipfs:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - dbh_network
      - fabric_ehr
    volumes:
      - ./src/DBH.Blockchain.Network/organizations:/tmp/fabric-crypto:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.EHR.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.EHR.Service/Dockerfile

  consent_service:
    build:
      context: .
      dockerfile: src/DBH.Consent.Service/Dockerfile
    container_name: dbh_consent_service
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5004
      - TZ=Asia/Ho_Chi_Minh
