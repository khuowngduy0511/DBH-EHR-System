# DBH-EHR System - Docker Compose for Development
# Decentralized Blockchain Healthcare System for Secure EHR Management

version: "3.8"

services:
  # ============================================================================
  # API GATEWAY
  # ============================================================================
  gateway:
    build:
      context: .
      dockerfile: src/DBH.Gateway/Dockerfile
    container_name: dbh_gateway
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    depends_on:
      - auth_service
      - organization_service
      - ehr_service
      - consent_service
      - audit_service
      - notification_service
      - appointment_service
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Gateway
        - action: rebuild
          path: ./src/DBH.Gateway/Dockerfile

  # ============================================================================
  # MICROSERVICES
  # ============================================================================

  auth_service:
    build:
      context: .
      dockerfile: src/DBH.Auth.Service/Dockerfile
    container_name: dbh_auth_service
    ports:
      - "5101:5101"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5101
      - ConnectionStrings__PostgreSQL=Host=pg_primary;Port=5432;Database=dbh_identity;Username=admin;Password=dbh_123
    depends_on:
      pg_primary:
        condition: service_healthy
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5101/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Auth.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Auth.Service/Dockerfile

  organization_service:
    build:
      context: .
      dockerfile: src/DBH.Organization.Service/Dockerfile
    container_name: dbh_organization_service
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5002
      - ConnectionStrings__OrganizationDb=Host=pg_primary;Port=5432;Database=dbh_organization;Username=admin;Password=dbh_123
    depends_on:
      pg_primary:
        condition: service_healthy
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Organization.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Organization.Service/Dockerfile

  ehr_service:
    build:
      context: .
      dockerfile: src/DBH.EHR.Service/Dockerfile
    container_name: dbh_ehr_service
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5003
      - ConnectionStrings__EhrDb=Host=pg_primary;Port=5432;Database=dbh_ehr;Username=admin;Password=dbh_123
      - IpfsConfig__ApiUrl=http://ipfs:5001/api/v0
      - IpfsConfig__GatewayUrl=http://ipfs:8080/ipfs
      - IpfsConfig__DownloadPath=/tmp/ipfs_downloads
      - ServiceUrls__AuthService=http://auth_service:5101
      - ServiceUrls__ConsentService=http://consent_service:5004
      - ServiceUrls__NotificationService=http://notification_service:5006
    depends_on:
      pg_primary:
        condition: service_healthy
      ipfs:
        condition: service_started
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.EHR.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.EHR.Service/Dockerfile

  consent_service:
    build:
      context: .
      dockerfile: src/DBH.Consent.Service/Dockerfile
    container_name: dbh_consent_service
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5004
      - ConnectionStrings__ConsentDb=Host=pg_primary;Port=5432;Database=dbh_consent;Username=admin;Password=dbh_123
      - ServiceUrls__AuthService=http://auth_service:5101
      - ServiceUrls__EhrService=http://ehr_service:5003
      - ServiceUrls__NotificationService=http://notification_service:5006
    depends_on:
      pg_primary:
        condition: service_healthy
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Consent.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Consent.Service/Dockerfile

  audit_service:
    build:
      context: .
      dockerfile: src/DBH.Audit.Service/Dockerfile
    container_name: dbh_audit_service
    ports:
      - "5005:5005"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5005
      - ConnectionStrings__AuditDb=Host=pg_primary;Port=5432;Database=dbh_audit;Username=admin;Password=dbh_123
    depends_on:
      pg_primary:
        condition: service_healthy
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Audit.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Audit.Service/Dockerfile

  notification_service:
    build:
      context: .
      dockerfile: src/DBH.Notification.Service/Dockerfile
    container_name: dbh_notification_service
    ports:
      - "5006:5006"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5006
      - ConnectionStrings__DefaultConnection=Host=pg_primary;Port=5432;Database=dbh_identity;Username=admin;Password=dbh_123
    depends_on:
      pg_primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Notification.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Notification.Service/Dockerfile

  appointment_service:
    build:
      context: .
      dockerfile: src/DBH.Appointment.Service/Dockerfile
    container_name: dbh_appointment_service
    ports:
      - "5007:5007"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5007
      - ConnectionStrings__AppointmentDb=Host=pg_primary;Port=5432;Database=dbh_appointment;Username=admin;Password=dbh_123
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=admin
      - RabbitMQ__Password=dbh_123
      - ServiceUrls__EhrService=http://ehr_service:5003
      - ServiceUrls__OrganizationService=http://organization_service:5002
      - ServiceUrls__AuthService=http://auth_service:5101
      - ServiceUrls__ConsentService=http://consent_service:5004
      - ServiceUrls__NotificationService=http://notification_service:5006
    depends_on:
      pg_primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./src/DBH.Appointment.Service
        - action: rebuild
          path: ./src/DBH.Shared.Domain
        - action: rebuild
          path: ./src/DBH.Shared.Contracts
        - action: rebuild
          path: ./src/DBH.Shared.Infrastructure
        - action: rebuild
          path: ./src/DBH.Appointment.Service/Dockerfile

  # ============================================================================
  # DATABASES
  # ============================================================================

  pg_primary:
    image: postgres:15-alpine
    container_name: dbh_pg_primary
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=dbh_123
      - POSTGRES_MULTIPLE_DATABASES=dbh_identity,dbh_ehr,dbh_audit,dbh_organization,dbh_consent,dbh_notification,dbh_appointment
    volumes:
      - pg_primary_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # IPFS
  # ============================================================================

  ipfs:
    image: ipfs/kubo:release
    container_name: dbh_ipfs
    restart: unless-stopped
    ports:
      - "4001:4001"
      - "4001:4001/udp"
      - "5001:5001"
      - "8080:8080"
    environment:
      - IPFS_PROFILE=server
      - IPFS_PATH=/data/ipfs
    volumes:
      - ipfs_data:/data/ipfs
      - ipfs_staging:/export
    networks:
      - dbh_network

  # ============================================================================
  # MESSAGE QUEUE
  # ============================================================================

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: dbh_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=dbh_123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================================
  # CACHE
  # ============================================================================

  redis:
    image: redis:7-alpine
    container_name: dbh_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dbh_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================================
# VOLUMES & NETWORKS
# ============================================================================

volumes:
  pg_primary_data:
  ipfs_data:
  ipfs_staging:
  rabbitmq_data:
  redis_data:

networks:
  dbh_network:
    driver: bridge
