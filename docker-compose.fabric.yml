# ============================================================================
# DBH-EHR System - Hyperledger Fabric Network
# ============================================================================
# Development/Testing network with:
# - 1 Orderer (Raft)
# - 2 Organizations (Org1 = Hospital A, Org2 = Hospital B)
# - 2 Peers (1 per org)
# - 2 CAs (1 per org)
# - CouchDB (state database for rich queries)
# - Fabric CLI Tools
# ============================================================================
#
# USAGE:
#   1. Generate crypto & artifacts: cd blockchain && ./network.sh up
#      OR run step-by-step:
#   2. Start containers: docker compose -f docker-compose.fabric.yml up -d
#   3. Create channel & deploy CC via CLI
#
# PREREQUISITES:
#   - Run ./blockchain/network.sh up (generates crypto, starts containers,
#     creates channel, deploys chaincodes — all-in-one)
#
# NOTE: Requires Hyperledger Fabric Docker images v2.5.x
#   Pull with: docker pull hyperledger/fabric-peer:2.5
# ============================================================================

services:
  # ===========================================================================
  # Certificate Authority - Org1 (Hospital A)
  # ===========================================================================
  ca_org1:
    image: hyperledger/fabric-ca:1.5
    container_name: dbh_ca_org1
    environment:
      FABRIC_CA_HOME: /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME: ca-org1
      FABRIC_CA_SERVER_TLS_ENABLED: "true"
      FABRIC_CA_SERVER_PORT: 7054
      FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS: 0.0.0.0:17054
    ports:
      - "7054:7054"
      - "17054:17054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ca_org1_data:/etc/hyperledger/fabric-ca-server
    networks:
      - dbh_fabric_network

  # ===========================================================================
  # Certificate Authority - Org2 (Hospital B)
  # ===========================================================================
  ca_org2:
    image: hyperledger/fabric-ca:1.5
    container_name: dbh_ca_org2
    environment:
      FABRIC_CA_HOME: /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME: ca-org2
      FABRIC_CA_SERVER_TLS_ENABLED: "true"
      FABRIC_CA_SERVER_PORT: 8054
      FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS: 0.0.0.0:18054
    ports:
      - "8054:8054"
      - "18054:18054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ca_org2_data:/etc/hyperledger/fabric-ca-server
    networks:
      - dbh_fabric_network

  # ===========================================================================
  # Orderer (Raft consensus)
  # ===========================================================================
  orderer:
    image: hyperledger/fabric-orderer:2.5
    container_name: dbh_orderer
    environment:
      FABRIC_LOGGING_SPEC: INFO
      ORDERER_GENERAL_LISTENADDRESS: 0.0.0.0
      ORDERER_GENERAL_LISTENPORT: 7050
      ORDERER_GENERAL_LOCALMSPID: OrdererMSP
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
      ORDERER_GENERAL_TLS_ENABLED: "true"
      ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_TLS_ROOTCAS: "[/var/hyperledger/orderer/tls/ca.crt]"
      ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_CLUSTER_ROOTCAS: "[/var/hyperledger/orderer/tls/ca.crt]"
      ORDERER_GENERAL_BOOTSTRAPMETHOD: none
      ORDERER_CHANNELPARTICIPATION_ENABLED: "true"
      ORDERER_ADMIN_TLS_ENABLED: "true"
      ORDERER_ADMIN_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_ADMIN_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_ADMIN_TLS_ROOTCAS: "[/var/hyperledger/orderer/tls/ca.crt]"
      ORDERER_ADMIN_TLS_CLIENTROOTCAS: "[/var/hyperledger/orderer/tls/ca.crt]"
      ORDERER_ADMIN_LISTENADDRESS: 0.0.0.0:7053
      ORDERER_OPERATIONS_LISTENADDRESS: 0.0.0.0:17050
    ports:
      - "7050:7050"
      - "7053:7053"
      - "17050:17050"
    volumes:
      - ./blockchain/organizations/ordererOrganizations/dbh.com/orderers/orderer.dbh.com/msp:/var/hyperledger/orderer/msp
      - ./blockchain/organizations/ordererOrganizations/dbh.com/orderers/orderer.dbh.com/tls:/var/hyperledger/orderer/tls
      - orderer_data:/var/hyperledger/production/orderer
    networks:
      dbh_fabric_network:
        aliases:
          - orderer.dbh.com

  # ===========================================================================
  # Peer - Org1 (Hospital A)
  # ===========================================================================
  peer0_org1:
    image: hyperledger/fabric-peer:2.5
    container_name: dbh_peer0_org1
    environment:
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: dbh_fabric_network
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_TLS_ENABLED: "true"
      CORE_PEER_PROFILE_ENABLED: "false"
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_ID: peer0.org1.dbh.com
      CORE_PEER_ADDRESS: peer0_org1:7051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:7051
      CORE_PEER_CHAINCODEADDRESS: peer0_org1:7052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:7052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0_org1:7051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0_org1:7051
      CORE_PEER_LOCALMSPID: Org1MSP
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/fabric/msp
      CORE_OPERATIONS_LISTENADDRESS: 0.0.0.0:17051
      # CouchDB
      CORE_LEDGER_STATE_STATEDATABASE: CouchDB
      CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS: couchdb_org1:5984
      CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME: admin
      CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD: adminpw
    ports:
      - "7051:7051"
      - "17051:17051"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./blockchain/organizations/peerOrganizations/org1.dbh.com/peers/peer0.org1.dbh.com/msp:/etc/hyperledger/fabric/msp
      - ./blockchain/organizations/peerOrganizations/org1.dbh.com/peers/peer0.org1.dbh.com/tls:/etc/hyperledger/fabric/tls
      - peer0_org1_data:/var/hyperledger/production
    depends_on:
      - couchdb_org1
    networks:
      dbh_fabric_network:
        aliases:
          - peer0.org1.dbh.com

  # ===========================================================================
  # Peer - Org2 (Hospital B)
  # ===========================================================================
  peer0_org2:
    image: hyperledger/fabric-peer:2.5
    container_name: dbh_peer0_org2
    environment:
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: dbh_fabric_network
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_TLS_ENABLED: "true"
      CORE_PEER_PROFILE_ENABLED: "false"
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_ID: peer0.org2.dbh.com
      CORE_PEER_ADDRESS: peer0_org2:9051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:9051
      CORE_PEER_CHAINCODEADDRESS: peer0_org2:9052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:9052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0_org2:9051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0_org2:9051
      CORE_PEER_LOCALMSPID: Org2MSP
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/fabric/msp
      CORE_OPERATIONS_LISTENADDRESS: 0.0.0.0:17061
      # CouchDB
      CORE_LEDGER_STATE_STATEDATABASE: CouchDB
      CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS: couchdb_org2:5984
      CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME: admin
      CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD: adminpw
    ports:
      - "9051:9051"
      - "17061:17061"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./blockchain/organizations/peerOrganizations/org2.dbh.com/peers/peer0.org2.dbh.com/msp:/etc/hyperledger/fabric/msp
      - ./blockchain/organizations/peerOrganizations/org2.dbh.com/peers/peer0.org2.dbh.com/tls:/etc/hyperledger/fabric/tls
      - peer0_org2_data:/var/hyperledger/production
    depends_on:
      - couchdb_org2
    networks:
      dbh_fabric_network:
        aliases:
          - peer0.org2.dbh.com

  # ===========================================================================
  # CouchDB - Org1 (Rich queries for state database)
  # ===========================================================================
  couchdb_org1:
    image: couchdb:3.3
    container_name: dbh_couchdb_org1
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: adminpw
    ports:
      - "5984:5984"
    volumes:
      - couchdb_org1_data:/opt/couchdb/data
    networks:
      - dbh_fabric_network

  # ===========================================================================
  # CouchDB - Org2
  # ===========================================================================
  couchdb_org2:
    image: couchdb:3.3
    container_name: dbh_couchdb_org2
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: adminpw
    ports:
      - "7984:5984"
    volumes:
      - couchdb_org2_data:/opt/couchdb/data
    networks:
      - dbh_fabric_network

  # ===========================================================================
  # Fabric CLI Tools (for channel creation, chaincode deployment)
  # ===========================================================================
  cli:
    image: hyperledger/fabric-tools:2.5
    container_name: dbh_fabric_cli
    tty: true
    stdin_open: true
    environment:
      GOPATH: /opt/gopath
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_ID: cli
      CORE_PEER_ADDRESS: peer0_org1:7051
      CORE_PEER_LOCALMSPID: Org1MSP
      CORE_PEER_TLS_ENABLED: "true"
      CORE_PEER_TLS_CERT_FILE: /opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/org1.dbh.com/peers/peer0.org1.dbh.com/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/org1.dbh.com/peers/peer0.org1.dbh.com/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/org1.dbh.com/peers/peer0.org1.dbh.com/tls/ca.crt
      CORE_PEER_MSPCONFIGPATH: /opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/org1.dbh.com/users/Admin@org1.dbh.com/msp
    volumes:
      - ./blockchain/chaincode:/opt/gopath/src/github.com/chaincode
      - ./blockchain/organizations:/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations
      - ./blockchain/channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
    depends_on:
      - peer0_org1
      - peer0_org2
      - orderer
    networks:
      - dbh_fabric_network

# =============================================================================
# Networks
# =============================================================================
networks:
  dbh_fabric_network:
    driver: bridge
    name: dbh_fabric_network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  ca_org1_data:
    name: dbh_ca_org1_data
  ca_org2_data:
    name: dbh_ca_org2_data
  orderer_data:
    name: dbh_orderer_data
  peer0_org1_data:
    name: dbh_peer0_org1_data
  peer0_org2_data:
    name: dbh_peer0_org2_data
  couchdb_org1_data:
    name: dbh_couchdb_org1_data
  couchdb_org2_data:
    name: dbh_couchdb_org2_data
