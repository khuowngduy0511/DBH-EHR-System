# ============================================================================
# DBH-EHR System - Hyperledger Fabric Network
# ============================================================================
# Production-aligned network matching network.sh topology:
# - 1 Orderer (Raft)
# - 3 Organizations: Hospital1, Hospital2, Clinic
# - 3 Peers (1 per org)
# - 3 CAs (1 per org) + 1 Orderer CA
# - 3 CouchDB (state database for rich queries)
# - Fabric CLI Tools
# - Hyperledger Explorer + ExplorerDB
# ============================================================================
#
# PREREQUISITES:
#   - Crypto material generated by network.sh (in src/DBH.Blockchain.Network/organizations/)
#   - Channels + chaincodes created by network.sh (data in compose_* volumes)
#
# USAGE:
#   docker compose -f docker-compose.fabric.yml up -d
#
# NOTE: This file is aligned with network.sh naming (Hospital1MSP, Hospital2MSP,
#   ClinicMSP) so docker-compose.dev.yml services can reach peers on fabric_ehr.
# ============================================================================

services:
  # ===========================================================================
  # Certificate Authorities
  # ===========================================================================
  ca_hospital1:
    image: hyperledger/fabric-ca:1.5
    container_name: ca_hospital1
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-hospital1
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:17054
    ports:
      - "7054:7054"
      - "17054:17054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./src/DBH.Blockchain.Network/organizations/fabric-ca/hospital1:/etc/hyperledger/fabric-ca-server
    networks:
      - fabric_ehr

  ca_hospital2:
    image: hyperledger/fabric-ca:1.5
    container_name: ca_hospital2
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-hospital2
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:18054
    ports:
      - "8054:8054"
      - "18054:18054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./src/DBH.Blockchain.Network/organizations/fabric-ca/hospital2:/etc/hyperledger/fabric-ca-server
    networks:
      - fabric_ehr

  ca_clinic:
    image: hyperledger/fabric-ca:1.5
    container_name: ca_clinic
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-clinic
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=10054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:20054
    ports:
      - "10054:10054"
      - "20054:20054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./src/DBH.Blockchain.Network/organizations/fabric-ca/clinic:/etc/hyperledger/fabric-ca-server
    networks:
      - fabric_ehr

  ca_orderer:
    image: hyperledger/fabric-ca:1.5
    container_name: ca_orderer
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-orderer
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=9054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:19054
    ports:
      - "9054:9054"
      - "19054:19054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./src/DBH.Blockchain.Network/organizations/fabric-ca/ordererOrg:/etc/hyperledger/fabric-ca-server
    networks:
      - fabric_ehr

  # ===========================================================================
  # Orderer (Raft consensus)
  # ===========================================================================
  orderer.ehr.com:
    container_name: orderer.ehr.com
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=orderer.ehr.com:9443
      - ORDERER_METRICS_PROVIDER=prometheus
    working_dir: /root
    command: orderer
    ports:
      - "7050:7050"
      - "7053:7053"
      - "9443:9443"
    volumes:
      - ./src/DBH.Blockchain.Network/organizations/ordererOrganizations/ehr.com/orderers/orderer.ehr.com/msp:/var/hyperledger/orderer/msp
      - ./src/DBH.Blockchain.Network/organizations/ordererOrganizations/ehr.com/orderers/orderer.ehr.com/tls:/var/hyperledger/orderer/tls
      - compose_orderer.ehr.com:/var/hyperledger/production/orderer
    networks:
      - fabric_ehr

  # ===========================================================================
  # Peers
  # ===========================================================================
  peer0.hospital1.ehr.com:
    container_name: peer0.hospital1.ehr.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.hospital1.ehr.com
      - CORE_PEER_ADDRESS=peer0.hospital1.ehr.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.hospital1.ehr.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.hospital1.ehr.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.hospital1.ehr.com:7051
      - CORE_PEER_LOCALMSPID=Hospital1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.hospital1.ehr.com:9444
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0hospital1"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_ehr
      # CouchDB
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdbHospital1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    working_dir: /root
    command: peer node start
    ports:
      - "7051:7051"
      - "9444:9444"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./src/DBH.Blockchain.Network/organizations/peerOrganizations/hospital1.ehr.com/peers/peer0.hospital1.ehr.com:/etc/hyperledger/fabric
      - ./src/DBH.Blockchain.Network/config:/etc/hyperledger/peercfg
      - compose_peer0.hospital1.ehr.com:/var/hyperledger/production
    depends_on:
      - couchdbHospital1
    networks:
      - fabric_ehr

  peer0.hospital2.ehr.com:
    container_name: peer0.hospital2.ehr.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.hospital2.ehr.com
      - CORE_PEER_ADDRESS=peer0.hospital2.ehr.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.hospital2.ehr.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.hospital2.ehr.com:9051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.hospital2.ehr.com:9051
      - CORE_PEER_LOCALMSPID=Hospital2MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.hospital2.ehr.com:9445
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0hospital2"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_ehr
      # CouchDB
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdbHospital2:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    working_dir: /root
    command: peer node start
    ports:
      - "9051:9051"
      - "9445:9445"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./src/DBH.Blockchain.Network/organizations/peerOrganizations/hospital2.ehr.com/peers/peer0.hospital2.ehr.com:/etc/hyperledger/fabric
      - ./src/DBH.Blockchain.Network/config:/etc/hyperledger/peercfg
      - compose_peer0.hospital2.ehr.com:/var/hyperledger/production
    depends_on:
      - couchdbHospital2
    networks:
      - fabric_ehr

  peer0.clinic.ehr.com:
    container_name: peer0.clinic.ehr.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.clinic.ehr.com
      - CORE_PEER_ADDRESS=peer0.clinic.ehr.com:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.clinic.ehr.com:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.clinic.ehr.com:11051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.clinic.ehr.com:11051
      - CORE_PEER_LOCALMSPID=ClinicMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=peer0.clinic.ehr.com:9446
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0clinic"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_ehr
      # CouchDB
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdbClinic:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    working_dir: /root
    command: peer node start
    ports:
      - "11051:11051"
      - "9446:9446"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./src/DBH.Blockchain.Network/organizations/peerOrganizations/clinic.ehr.com/peers/peer0.clinic.ehr.com:/etc/hyperledger/fabric
      - ./src/DBH.Blockchain.Network/config:/etc/hyperledger/peercfg
      - compose_peer0.clinic.ehr.com:/var/hyperledger/production
    depends_on:
      - couchdbClinic
    networks:
      - fabric_ehr

  # ===========================================================================
  # CouchDB (State Database)
  # ===========================================================================
  couchdbHospital1:
    container_name: couchdbHospital1
    image: couchdb:3.4.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    networks:
      - fabric_ehr

  couchdbHospital2:
    container_name: couchdbHospital2
    image: couchdb:3.4.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "7984:5984"
    networks:
      - fabric_ehr

  couchdbClinic:
    container_name: couchdbClinic
    image: couchdb:3.4.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "9984:5984"
    networks:
      - fabric_ehr

  # ===========================================================================
  # Fabric CLI Tools
  # ===========================================================================
  cli:
    image: hyperledger/fabric-tools:2.5
    container_name: dbh_fabric_cli
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - FABRIC_LOGGING_SPEC=INFO
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.hospital1.ehr.com:7051
      - CORE_PEER_LOCALMSPID=Hospital1MSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/hospital1.ehr.com/peers/peer0.hospital1.ehr.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/hospital1.ehr.com/peers/peer0.hospital1.ehr.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/hospital1.ehr.com/peers/peer0.hospital1.ehr.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/hospital1.ehr.com/users/Admin@hospital1.ehr.com/msp
    volumes:
      - ./src/DBH.Blockchain.Network/organizations:/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations
      - ./src/DBH.Blockchain.Network/channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - ./blockchain/chaincode:/opt/gopath/src/github.com/chaincode
      - ./src/DBH.Blockchain.Network/config:/etc/hyperledger/peercfg
    depends_on:
      - peer0.hospital1.ehr.com
      - peer0.hospital2.ehr.com
      - peer0.clinic.ehr.com
      - orderer.ehr.com
    networks:
      - fabric_ehr

  # ===========================================================================
  # Hyperledger Explorer
  # ===========================================================================
  explorerdb:
    image: ghcr.io/hyperledger-labs/explorer-db:latest
    container_name: explorerdb.mynetwork.com
    hostname: explorerdb.mynetwork.com
    environment:
      - DATABASE_DATABASE=fabricexplorer
      - DATABASE_USERNAME=hppoc
      - DATABASE_PASSWORD=password
    healthcheck:
      test: "pg_isready -h localhost -p 5432 -q -U postgres"
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - explorer_pgdata:/var/lib/postgresql/data
    networks:
      - fabric_ehr

  explorer:
    image: ghcr.io/hyperledger-labs/explorer:latest
    container_name: explorer.mynetwork.com
    hostname: explorer.mynetwork.com
    environment:
      - DATABASE_HOST=explorerdb.mynetwork.com
      - DATABASE_DATABASE=fabricexplorer
      - DATABASE_USERNAME=hppoc
      - DATABASE_PASSWD=password
      - LOG_LEVEL_APP=info
      - LOG_LEVEL_DB=info
      - LOG_LEVEL_CONSOLE=debug
      - LOG_CONSOLE_STDOUT=true
      - DISCOVERY_AS_LOCALHOST=false
      - PORT=8070
    volumes:
      - ./src/DBH.Blockchain.Network/explorer/config.json:/opt/explorer/app/platform/fabric/config.json
      - ./src/DBH.Blockchain.Network/explorer/connection-profile:/opt/explorer/app/platform/fabric/connection-profile
      - ./src/DBH.Blockchain.Network/organizations:/tmp/crypto
      - explorer_walletstore:/opt/explorer/wallet
    ports:
      - "8070:8070"
    depends_on:
      explorerdb:
        condition: service_healthy
      peer0.hospital1.ehr.com:
        condition: service_started
    networks:
      - fabric_ehr

# =============================================================================
# Networks
# =============================================================================
networks:
  fabric_ehr:
    name: fabric_ehr
    external: true

# =============================================================================
# Volumes (reuse existing network.sh volumes for channel/chaincode data)
# =============================================================================
volumes:
  compose_orderer.ehr.com:
    external: true
  compose_peer0.hospital1.ehr.com:
    external: true
  compose_peer0.hospital2.ehr.com:
    external: true
  compose_peer0.clinic.ehr.com:
    external: true
  explorer_pgdata:
  explorer_walletstore:
