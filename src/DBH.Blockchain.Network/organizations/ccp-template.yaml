---
name: ${ORG}Gateway
version: 1.0.0
client:
  organization: ${ORG}
  connection:
    timeout:
      peer:
        endorser: "300"
organizations:
  ${ORG}:
    mspid: ${ORG}MSP
    peers:
      - peer0.${ORGDOMAIN}
    certificateAuthorities:
      - ca.${ORGDOMAIN}
peers:
  peer0.${ORGDOMAIN}:
    url: grpcs://localhost:${P0PORT}
    tlsCACerts:
      pem: |
        ${PEERPEM}
    grpcOptions:
      ssl-target-name-override: peer0.${ORGDOMAIN}
      hostnameOverride: peer0.${ORGDOMAIN}
certificateAuthorities:
  ca.${ORGDOMAIN}:
    url: https://localhost:${CAPORT}
    caName: ca-${ORG}
    tlsCACerts:
      pem:
        - |
          ${CAPEM}
    httpOptions:
      verify: false
