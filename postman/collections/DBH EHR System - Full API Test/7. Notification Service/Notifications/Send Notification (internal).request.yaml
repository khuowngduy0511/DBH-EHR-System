$kind: http-request
url: "{{baseUrl}}/api/v1/notifications"
method: POST
body:
  type: json
  content: |-
    {
      "recipientDid": "{{patientDid}}",
      "recipientUserId": "{{userId}}",
      "title": "Lich hen da duoc xac nhan",
      "body": "Bac si Tran B da xac nhan lich hen cua ban ngay 01/04/2026",
      "type": "AppointmentReminder",
      "priority": "Normal",
      "channel": "Push",
      "referenceId": "{{appointmentId}}",
      "referenceType": "Appointment"
    }
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
scripts:
  - type: afterResponse
    code: >-
      try {
          var jsonData = pm.response.json();
          var id = jsonData.notificationId || jsonData.data?.notificationId || jsonData.data?.id;
          if (id) { pm.collectionVariables.set('notificationId', id); }
      } catch(e) {}

      pm.test('Send notification successful or validation error', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201, 400, 401]);
      });
order: 1000
