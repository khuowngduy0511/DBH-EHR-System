$kind: http-request
url: "{{baseUrl}}/api/v1/departments"
method: POST
body:
  type: json
  content: |-
    {
      "orgId": "{{orgId}}",
      "departmentName": "Khoa Tim Mach",
      "departmentCode": "CARD-01",
      "description": "Khoa Tim Mach - Cardiology Department",
      "floor": "3",
      "roomNumbers": "301-310",
      "phoneExtension": "301"
    }
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
scripts:
  - type: afterResponse
    code: |-
      try {
          var jsonData = pm.response.json();
          var id = jsonData.departmentId || jsonData.data?.departmentId;
          if (id) { pm.collectionVariables.set('departmentId', id); }
      } catch(e) {}
      pm.test('Create department successful or already exists', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201, 400, 403, 409]);
      });
order: 1000
