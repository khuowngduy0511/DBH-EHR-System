$kind: http-request
url: "{{baseUrl}}/api/v1/consents"
method: POST
body:
  type: json
  content: |-
    {
      "patientId": "{{patientId}}",
      "patientDid": "{{patientDid}}",
      "granteeId": "{{doctorUserId}}",
      "granteeDid": "{{doctorDid}}",
      "granteeType": "DOCTOR",
      "ehrId": "{{ehrId}}",
      "permission": "READ",
      "purpose": "TREATMENT",
      "durationDays": 30
    }
auth:
  type: bearer
  credentials:
    token: "{{patientToken}}"
scripts:
  - type: afterResponse
    code: |-
      try {
          var jsonData = pm.response.json();
          var id = jsonData.consentId || jsonData.data?.consentId;
          if (id) { pm.collectionVariables.set('consentId', id); }
      } catch(e) {}
      pm.test('Grant consent successful or validation error', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201, 400, 409]);
      });
order: 1000
