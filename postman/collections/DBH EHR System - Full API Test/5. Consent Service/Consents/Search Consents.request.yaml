$kind: http-request
url: "{{baseUrl}}/api/v1/consents/search?page=1&pageSize=10"
method: GET
queryParams:
  - key: patientId
    value: "{{patientId}}"
    disabled: true
  - key: granteeId
    value: ""
    disabled: true
  - key: status
    value: ""
    disabled: true
  - key: purpose
    value: ""
    disabled: true
  - key: page
    value: "1"
  - key: pageSize
    value: "10"
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
order: 5000
