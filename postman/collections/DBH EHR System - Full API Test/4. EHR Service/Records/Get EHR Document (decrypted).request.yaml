$kind: http-request
url: "{{baseUrl}}/api/v1/ehr/records/{{ehrId}}/document"
method: GET
headers:
  X-Requester-Id: "{{doctorUserId}}"
scripts:
  - type: afterResponse
    code: >-
      pm.test('Get EHR document successful or consent/infra required', function
      () {
          pm.expect(pm.response.code).to.be.oneOf([200, 400, 403, 404]);
      });
order: 3000
