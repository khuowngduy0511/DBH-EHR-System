$kind: http-request
url: "{{baseUrl}}/api/v1/appointments?page=1&pageSize=10"
method: GET
queryParams:
  - key: patientId
    value: "{{patientId}}"
    disabled: true
  - key: doctorId
    value: "{{doctorUserId}}"
    disabled: true
  - key: orgId
    value: "{{orgId}}"
    disabled: true
  - key: status
    value: PENDING
    disabled: true
  - key: page
    value: "1"
  - key: pageSize
    value: "10"
order: 4000
