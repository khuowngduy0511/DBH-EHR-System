$kind: http-request
url: "{{baseUrl}}/api/v1/doctors"
method: POST
body:
  type: json
  content: |-
    {
      "userId": "{{doctorUserId}}",
      "specialty": "Cardiology",
      "licenseNumber": "BS-2024-001",
      "licenseImage": "https://storage.dbh.vn/licenses/doctor001.jpg",
      "verifiedStatus": "Pending"
    }
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
scripts:
  - type: afterResponse
    code: >-
      try {
          var jsonData = pm.response.json();
          if (jsonData.doctorId) { pm.collectionVariables.set('doctorId', jsonData.doctorId); }
      } catch(e) {}

      pm.test('Create doctor successful or already exists', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201, 400, 403, 409]);
      });
order: 3000
