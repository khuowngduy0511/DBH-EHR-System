$kind: http-request
url: "{{baseUrl}}/api/v1/staff"
method: POST
body:
  type: json
  content: |-
    {
      "userId": "{{userId}}",
      "role": "Nurse",
      "licenseNumber": "DD-2024-001",
      "specialty": "Emergency",
      "verifiedStatus": "Pending"
    }
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
scripts:
  - type: afterResponse
    code: >-
      try {
          var jsonData = pm.response.json();
          if (jsonData.staffId) { pm.collectionVariables.set('staffId', jsonData.staffId); }
      } catch(e) {}

      pm.test('Create staff successful or already exists', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201, 400, 403, 409]);
      });
order: 3000
