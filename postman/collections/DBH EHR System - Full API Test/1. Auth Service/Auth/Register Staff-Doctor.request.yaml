$kind: http-request
name: Register Staff/Doctor
url: "{{baseUrl}}/api/v1/auth/registerStaffDoctor"
method: POST
body:
  type: json
  content: |-
    {
      "fullName": "Bac Si Tran B",
      "email": "doctor@dbh.vn",
      "password": "Doctor@123",
      "phone": "0907654321",
      "role": "Doctor"
    }
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
scripts:
  - type: afterResponse
    code: >-
      try {
          var jsonData = pm.response.json();
          if (jsonData.userId) {
              pm.collectionVariables.set('doctorUserId', jsonData.userId);
          }
      } catch(e) {}

      pm.test('Register staff/doctor successful or already exists', function ()
      {
          pm.expect(pm.response.code).to.be.oneOf([200, 201, 400, 403]);
      });
order: 6000
