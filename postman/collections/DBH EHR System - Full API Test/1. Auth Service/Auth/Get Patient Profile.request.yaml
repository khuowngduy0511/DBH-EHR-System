$kind: http-request
url: "{{baseUrl}}/api/v1/auth/me"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{patientToken}}"
scripts:
  - type: afterResponse
    code: >-
      try {
          var jsonData = pm.response.json();
          if (jsonData.profiles && jsonData.profiles.Patient) {
              pm.collectionVariables.set('patientId', jsonData.profiles.Patient.patientId);
          }
          pm.test('Get patient profile successful', function () {
              pm.expect(pm.response.code).to.equal(200);
          });
      } catch(e) {}
order: 3000
