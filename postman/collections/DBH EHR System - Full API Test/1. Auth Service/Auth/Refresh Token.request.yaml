$kind: http-request
url: "{{baseUrl}}/api/v1/auth/refresh-token"
method: POST
body:
  type: json
  content: |-
    {
      "refreshToken": "{{refreshToken}}"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: >-
      var jsonData = pm.response.json();

      if (jsonData.token) { pm.collectionVariables.set('token', jsonData.token);
      }

      if (jsonData.refreshToken) { pm.collectionVariables.set('refreshToken',
      jsonData.refreshToken); }

      pm.test('Refresh token successful', function () {
          pm.expect(pm.response.code).to.equal(200);
      });
order: 9000
