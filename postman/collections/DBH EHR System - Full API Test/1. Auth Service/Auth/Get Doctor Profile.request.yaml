$kind: http-request
url: "{{baseUrl}}/api/v1/auth/me"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{doctorToken}}"
scripts:
  - type: afterResponse
    code: >-
      try {
          var jsonData = pm.response.json();
          if (jsonData.profiles && jsonData.profiles.Doctor) {
              pm.collectionVariables.set('doctorId', jsonData.profiles.Doctor.doctorId);
          }
          pm.test('Get doctor profile successful', function () {
              pm.expect(pm.response.code).to.equal(200);
          });
      } catch(e) {}
order: 8000
