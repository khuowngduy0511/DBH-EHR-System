$kind: http-request
url: "{{baseUrl}}/api/v1/auth/updateRole"
method: PUT
body:
  type: json
  content: |-
    {
      "userId": "{{userId}}",
      "newRole": "Admin"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test('Update role to Admin successful or already Admin', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201, 400]);
      });
order: 4000
