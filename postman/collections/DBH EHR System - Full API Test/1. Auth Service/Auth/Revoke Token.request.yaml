$kind: http-request
url: "{{baseUrl}}/api/v1/auth/revoke-token"
method: POST
scripts:
  - type: afterResponse
    code: >-
      pm.collectionVariables.set('token',
      pm.collectionVariables.get('adminToken'));

      pm.test('Revoke token accepted', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 204, 401]);
      });
order: 10000
