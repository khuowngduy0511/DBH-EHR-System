$kind: http-request
url: "{{baseUrl}}/api/v1/auth/login"
method: POST
body:
  type: json
  content: |-
    {
      "email": "doctor@dbh.vn",
      "password": "Doctor@123"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: >-
      var jsonData = pm.response.json();

      if (jsonData.token) {
          pm.collectionVariables.set('doctorToken', jsonData.token);
          pm.collectionVariables.set('token', jsonData.token);
      }

      if (jsonData.userId) {
          pm.collectionVariables.set('doctorUserId', jsonData.userId);
          pm.collectionVariables.set('doctorDid', 'did:dbh:' + jsonData.userId);
      }

      pm.test('Doctor login successful or doctor not yet registered', function
      () {
          pm.expect(pm.response.code).to.be.oneOf([200, 401]);
      });
order: 7000
