$kind: http-request
url: "{{baseUrl}}/api/v1/audit/{{auditLogId}}"
method: GET
scripts:
  - type: afterResponse
    code: >-
      try {
          var jsonData = pm.response.json();
          if (jsonData.id) { pm.collectionVariables.set('auditLogId', jsonData.id); }
      } catch(e) {}
order: 2000
