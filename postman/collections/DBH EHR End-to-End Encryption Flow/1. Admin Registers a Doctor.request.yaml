$kind: http-request
url: "{{auth_url}}/api/v1/auth/admin/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "fullName": "Dr. Strange",
      "email": "doctor@test.com",
      "password": "Password123!",
      "phone": "1234567890",
      "role": "Doctor"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      pm.environment.set("doctor_token", jsonData.token);
      pm.environment.set("doctor_id", jsonData.userId);
    language: text/javascript
order: 1000
