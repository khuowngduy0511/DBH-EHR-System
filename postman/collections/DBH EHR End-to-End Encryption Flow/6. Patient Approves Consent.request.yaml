$kind: http-request
url: "{{consent_url}}/api/access-requests/{{request_id}}/respond"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "approve": true,
      "responseReason": "Approved for treatment."
    }
auth:
  type: bearer
  credentials:
    token: "{{patient_token}}"
order: 6000
