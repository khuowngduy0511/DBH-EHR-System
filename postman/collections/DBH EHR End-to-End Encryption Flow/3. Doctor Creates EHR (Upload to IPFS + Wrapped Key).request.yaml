$kind: http-request
url: "{{ehr_url}}/Ehr/records"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: >-
    {
      "patientId": "{{patient_id}}",
      "createdByDoctorId": "{{doctor_id}}",
      "encounterId": "3fa85f64-5717-4562-b3fc-2c963f66afa6",
      "hospitalId": "3fa85f64-5717-4562-b3fc-2c963f66afa6",
      "reportType": "DIAGNOSIS",
      "data": {
        "diagnosis": "Hypertension",
        "notes": "Patient needs to take medication. This file will be encrypted and saved to IPFS."
      }
    }
auth:
  type: bearer
  credentials:
    token: "{{doctor_token}}"
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      pm.environment.set("ehr_id", jsonData.ehrId);
    language: text/javascript
order: 3000
