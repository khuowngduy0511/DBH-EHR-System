$kind: http-request
url: "{{auth_url}}/api/v1/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "fullName": "John Doe Patient",
      "email": "patient@test.com",
      "password": "Password123!",
      "phone": "0987654321"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      pm.environment.set("patient_token", jsonData.token);
      pm.environment.set("patient_id", jsonData.userId);
    language: text/javascript
order: 2000
